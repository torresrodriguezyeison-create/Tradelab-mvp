<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeLab Pro - Strategy Tester</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #131722; color: #d1d4dc; }
       .header { padding: 12px; background: #1e222d; border-bottom: 1px solid #2a2e39; }
       .header h1 { font-size: 18px; }
       .container { display: flex; flex-direction: column; height: calc(100vh - 50px); }
       .controls { padding: 12px; background: #1e222d; display: flex; gap: 8px; flex-wrap: wrap; }
        select, button { padding: 8px 12px; background: #2a2e39; color: #d1d4dc; border: 1px solid #363a45; border-radius: 4px; font-size: 14px; }
        button { background: #2962ff; border: none; font-weight: 600; }
        button:active { background: #1e4bd8; }
        #chart { flex: 1; }
        #editor { height: 200px; border-top: 1px solid #2a2e39; }
       .metrics { padding: 12px; background: #1e222d; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; font-size: 12px; }
       .metric { background: #2a2e39; padding: 8px; border-radius: 4px; }
       .metric-label { color: #868993; }
       .metric-value { font-size: 16px; font-weight: 600; }
       .green { color: #26a69a; }.red { color: #ef5350; }
    </style>
</head>
<body>
    <div class="header"><h1>TradeLab Pro v2.0</h1></div>
    <div class="container">
        <div class="controls">
            <select id="symbol">
                <option value="BTC-USD">BTC-USD</option>
                <option value="ETH-USD">ETH-USD</option>
                <option value="EURUSD=X">EUR/USD</option>
                <option value="AAPL">AAPL</option>
                <option value="TSLA">TSLA</option>
                <option value="SPY">S&P 500</option>
            </select>
            <select id="timeframe">
                <option value="1d">1 Día</option>
                <option value="1h">1 Hora</option>
                <option value="15m">15 Min</option>
            </select>
            <button id="runBtn">▶ Ejecutar Backtest</button>
        </div>
        <div id="chart"></div>
        <div id="editor"></div>
        <div class="metrics" id="metrics"></div>
    </div>

    <script>
        // 1. Gráfico TradingView
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
            width: window.innerWidth,
            height: window.innerHeight - 350,
        });
        const candleSeries = chart.addCandlestickSeries();

        // 2. Editor de código
        let editor;
        require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' }});
        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: `// Estrategia: Cruce de Medias
// data = array de velas: {open, high, low, close, time}
// return 1 = COMPRA, -1 = VENTA, 0 = HOLD

function strategy(data, i) {
  if (i < 20) return 0;

  const sma10 = avg(data.slice(i-10, i).map(c => c.close));
  const sma20 = avg(data.slice(i-20, i).map(c => c.close));
  const prevSma10 = avg(data.slice(i-11, i-1).map(c => c.close));
  const prevSma20 = avg(data.slice(i-21, i-1).map(c => c.close));

  // Cruce alcista
  if (sma10 > sma20 && prevSma10 <= prevSma20) return 1;
  // Cruce bajista
  if (sma10 < sma20 && prevSma10 >= prevSma20) return -1;

  return 0;
}

function avg(arr) { return arr.reduce((a,b) => a+b, 0) / arr.length; }`,
                language: 'javascript',
                theme: 'vs-dark',
                minimap: { enabled: false },
                fontSize: 12
            });
        });

        // 3. Ejecutar Backtest
        document.getElementById('runBtn').onclick = async () => {
            const symbol = document.getElementById('symbol').value;
            const code = editor.getValue();

            document.getElementById('runBtn').textContent = 'Cargando...';

            // CAMBIA ESTA URL por tu API de Render
            const API_URL = 'https://tu-api-render.onrender.com/backtest';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol, code })
                });
                const data = await res.json();

                // Pintar velas
                candleSeries.setData(data.candles);

                // Pintar señales
                const markers = data.signals.map(s => ({
                    time: s.time,
                    position: s.signal === 1? 'belowBar' : 'aboveBar',
                    color: s.signal === 1? '#26a69a' : '#ef5350',
                    shape: s.signal === 1? 'arrowUp' : 'arrowDown',
                    text: s.signal === 1? 'BUY' : 'SELL'
                }));
                candleSeries.setMarkers(markers);

                // Métricas
                document.getElementById('metrics').innerHTML = `
                    <div class="metric"><div class="metric-label">Win Rate</div><div class="metric-value">${data.metrics.winRate}%</div></div>
                    <div class="metric"><div class="metric-label">Profit Factor</div><div class="metric-value ${data.metrics.profitFactor > 1? 'green' : 'red'}">${data.metrics.profitFactor}</div></div>
                    <div class="metric"><div class="metric-label">Total Trades</div><div class="metric-value">${data.metrics.totalTrades}</div></div>
                    <div class="metric"><div class="metric-label">Net Profit</div><div class="metric-value ${data.metrics.netProfit > 0? 'green' : 'red'}">${data.metrics.netProfit}%</div></div>
                `;

            } catch(e) {
                alert('Error: ' + e.message + '\nSi Render estaba dormido, intenta de nuevo en 30 seg.');
            }
            document.getElementById('runBtn').textContent = '▶ Ejecutar Backtest';
        };
    </script>
</body>
</html>
