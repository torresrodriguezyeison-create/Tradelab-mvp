<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strategy Tester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container { width: 100%; max-width: 560px; }

    .banner {
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 28px;
      font-size: 13px;
      color: #93c5fd;
      line-height: 1.6;
    }
    .banner strong { color: #bfdbfe; display: block; margin-bottom: 2px; }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.3px; }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }

    input[type="file"],
    input[type="number"] {
      width: 100%;
      background: #1c1e26;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 9px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #3b82f6; }
    input[type="file"] { cursor: pointer; }
    input[type="file"]::file-selector-button {
      background: #2d3148;
      border: none;
      border-radius: 5px;
      color: #e2e8f0;
      padding: 4px 10px;
      margin-right: 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    button {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: #f87171;
      padding: 12px 16px;
      font-size: 13px;
      margin-top: 20px;
    }

    .results {
      margin-top: 24px;
      border: 1px solid #2d3148;
      border-radius: 10px;
      overflow: hidden;
    }
    .results-header {
      padding: 10px 16px;
      border-bottom: 1px solid #2d3148;
      font-size: 11px;
      color: #64748b;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
    .result-cell {
      padding: 24px 12px;
      text-align: center;
      border-right: 1px solid #2d3148;
    }
    .result-cell:last-child { border-right: none; }
    .result-label {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .result-value {
      font-size: 26px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .positive { color: #34d399; }
    .negative { color: #f87171; }
    .neutral  { color: #e2e8f0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="banner">
      <strong>Crea tu estrategia con tu IA favorita: ChatGPT, Gemini, Claude.</strong>
      Luego pégala aquí para testearla con datos reales.
    </div>

    <h1>Strategy Tester</h1>

    <div class="field">
      <label>Archivo CSV (OHLC con columna "close")</label>
      <input type="file" id="csvFile" accept=".csv" />
    </div>

    <div class="row">
      <div class="field">
        <label>MA Rápida (periodo)</label>
        <input type="number" id="maFast" value="10" min="1" max="200" />
      </div>
      <div class="field">
        <label>MA Lenta (periodo)</label>
        <input type="number" id="maSlow" value="30" min="2" max="500" />
      </div>
    </div>

    <div class="field">
      <label>Capital inicial (USD)</label>
      <input type="number" id="capital" value="10000" min="100" step="1000" />
    </div>

    <button id="runBtn" onclick="runBacktest()">▶ Ejecutar Backtest</button>

    <div id="error" class="error" style="display:none;"></div>

    <div id="results" class="results" style="display:none;">
      <div class="results-header" id="resultsHeader"></div>
      <div class="results-grid">
        <div class="result-cell">
          <div class="result-label">Ganancia</div>
          <div class="result-value" id="profitPct"></div>
        </div>
        <div class="result-cell">
          <div class="result-label">Capital final</div>
          <div class="result-value neutral" id="finalCapital"></div>
        </div>
        <div class="result-cell">
          <div class="result-label">Nº de trades</div>
          <div class="result-value neutral" id="trades"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BACKEND = "http://localhost:8000";

    async function runBacktest() {
      const file    = document.getElementById("csvFile").files[0];
      const maFast  = parseInt(document.getElementById("maFast").value);
      const maSlow  = parseInt(document.getElementById("maSlow").value);
      const capital = parseFloat(document.getElementById("capital").value);
      const btn     = document.getElementById("runBtn");
      const errEl   = document.getElementById("error");
      const resEl   = document.getElementById("results");

      errEl.style.display = "none";
      resEl.style.display = "none";

      if (!file)              return showError("Selecciona un archivo CSV.");
      if (maFast >= maSlow)   return showError("La MA rápida debe ser menor que la MA lenta.");
      if (!capital || capital < 100) return showError("Capital mínimo: $100.");

      btn.disabled = true;
      btn.textContent = "Ejecutando...";

      const form = new FormData();
      form.append("file", file);
      form.append("capital", capital);
      form.append("ma_fast", maFast);
      form.append("ma_slow", maSlow);

      try {
        const res = await fetch('https://tradelab-mvp.onrender.com/backtest', {
  method: 'POST',
  body: form
});
        const data = await res.json();

        if (data.error) return showError(data.error);

        document.getElementById("resultsHeader").textContent =
          `Resultados — MA Crossover ${maFast}/${maSlow}`;

        const pct = data.profit_pct;
        const pctEl = document.getElementById("profitPct");
        pctEl.textContent = (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%";
        pctEl.className = "result-value " + (pct >= 0 ? "positive" : "negative");

        document.getElementById("finalCapital").textContent =
          "$" + data.final_capital.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        document.getElementById("trades").textContent = data.trades;

        resEl.style.display = "block";
      } catch (e) {
        showError("No se pudo conectar al backend. ¿Está corriendo en localhost:8000?");
      } finally {
        btn.disabled = false;
        btn.textContent = "▶ Ejecutar Backtest";
      }
    }

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.style.display = "block";
      document.getElementById("runBtn").disabled = false;
      document.getElementById("runBtn").textContent = "▶ Ejecutar Backtest";
    }
  </script>
</body>
</html>
